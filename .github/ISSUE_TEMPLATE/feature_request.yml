name: Feature request
description: Suggest a new feature or improvement
title: "[FEATURE] "
labels: ["enhancement"]
assignees: mamo-nick
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your idea in detail.
        
        *Czech language is welcome / Můžete psát také česky.*

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear description of the feature you'd like to see.
      placeholder: I would like...
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why would this feature be useful? What problem does it solve?
      placeholder: This would help me...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you imagine the feature working?
      placeholder: It could work by...

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any alternative solutions or workarounds?

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other information, screenshots or examples that might help.
