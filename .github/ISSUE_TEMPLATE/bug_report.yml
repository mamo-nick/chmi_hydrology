name: Bug report
description: Report a problem with CHMI Hydrology integration
title: "[BUG] "
labels: ["bug"]
assignees: mamo-nick
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

  - type: input
    id: integration_version
    attributes:
      label: Integration version
      placeholder: e.g. 0.9.0
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: e.g. 2024.5.0
    validations:
      required: true

  - type: dropdown
    id: installation
    attributes:
      label: Installation method
      options:
        - HACS
        - Manual
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the problem.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: station
    attributes:
      label: Affected station (if relevant)
      description: Station name and/or CHMI ID
      placeholder: e.g. Dědina Mitrov (0-203-1-039000)

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs from Settings → System → Logs, filtered by `chmi_hydrology`.
      render: text
      placeholder: Paste logs here...
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, dashboard config or anything else that might help.
